name: Bug report
description: Something works incorrectly or unexpectedly.
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: |
        Smallest code snippet that triggers the bug. Include input and observed output.
      render: ts
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Package version
      placeholder: 0.2.0
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node version
      placeholder: v22.0.0
